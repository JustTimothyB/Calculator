<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator-layout">
    <div class="calculator">

        <div class="output">
            <output>0</output>
        </div>
    
        <div class="container"> 
            <button class="operator">+</button>
            <button class="operator">-</button>
            <button class="operator">/</button>
            <button class="operator">*</button>
            <button class="equal">=</button>
            <button class="clear">Clear</button>
        
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>

            <button class="backspace"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="m456-320 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 160q-19 0-36-8.5T296-192L80-480l216-288q11-15 28-23.5t36-8.5h440q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H360ZM180-480l180 240h440v-480H360L180-480Zm400 0Z"/></svg></button>
            <button class="number">0</button>
            <button class="decimal">.</button>

        </div>
    </div>

        <div class="history">
            <h2>History</h2>
            <div class="history-list">
                <p class="empty-history">No calculations yet.</p>
            </div>
            <button class="clear-history">Clear History</button>
        </div>

</div>
    <script src="script.js"></script>
</body>
</html>
